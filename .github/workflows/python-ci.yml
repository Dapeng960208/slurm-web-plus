---
name: Backend Tests
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  python_tests:
    name: Python unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12"]
    env:
      RESULTS_DIR: ci-results/backend-python-${{ matrix.python-version }}
      ARTIFACT_NAME: backend-python-${{ matrix.python-version }}
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Run backend unit test command
        run: |
          COMMAND="sudo apt-get update && sudo apt-get install -y build-essential python3-dev libldap2-dev libsasl2-dev libcairo2-dev libgirepository-1.0-dev libgirepository-2.0-dev libpango1.0-dev && python -m pip install --upgrade pip && pip install . '.[agent]' '.[gateway]' '.[tests]' && pytest slurmweb/tests --junitxml=${RESULTS_DIR}/junit.xml"
          node .github/scripts/run-ci-command.mjs \
            --results-dir "$RESULTS_DIR" \
            --artifact-name "$ARTIFACT_NAME" \
            --label "backend-unit-tests" \
            --junit-path "${RESULTS_DIR}/junit.xml" \
            --command "$COMMAND"

      - name: Ensure backend unit test result
        if: always()
        run: |
          node .github/scripts/ensure-ci-result.mjs \
            --results-dir "$RESULTS_DIR" \
            --artifact-name "$ARTIFACT_NAME" \
            --label "backend-unit-tests" \
            --junit-path "${RESULTS_DIR}/junit.xml" \
            --command "pytest slurmweb/tests --junitxml=${RESULTS_DIR}/junit.xml"

      - name: Upload backend unit test artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.RESULTS_DIR }}
          if-no-files-found: error
